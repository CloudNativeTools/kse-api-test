# -*- coding:utf-8 -*-
# 测试模块标签配置
#
# 运行策略:
#   单集群: arun -e dev -m "not multi_cluster"   # 排除多集群用例，其他全跑
#   多集群: arun -e dev                          # 全部跑
#
# 运行单个模块:
#   单集群: arun -e dev -m "alerting_management and not multi_cluster"
#   多集群: arun -e dev -m alerting_management

modules:
  # ===== whizard-alerting 可观测平台 =====
  alerting_management:
    description: "whizard-alerting 告警管理模块"

  whizard_monitoring:
    description: "whizard-monitoring 监控管理模块"

  whizard_events:
    description: "whizard-events 事件管理模块"

  whizard_logs:
    description: "whizard-logs 日志管理模块"

  whizard_auditing:
    description: "whizard-auditing 审计管理模块"

  notification:
    description: "通知管理模块"

  # ===== ks-core 核心模块 =====
  ks_core:
    description: "ks-core 通用模块"

  access_management:
    description: "访问管理（成员、角色等）"

  authentication:
    description: "认证管理"

  # ===== 其他模块 =====
  workspace:
    description: "企业空间管理"

  project:
    description: "项目管理"

  workload:
    description: "工作负载（Deployment、StatefulSet 等）"

  service:
    description: "服务管理（Service、Ingress 等）"

  storage:
    description: "存储管理"

  network:
    description: "网络管理（NetworkPolicy 等）"

  whizard_network_traffic:
    description: "whizard-network-traffic 网络流量拓扑模块"

  whizard_http_traffic:
    description: "whizard-http-traffic HTTP服务拓扑模块"

markers:
  multi_cluster: "多集群用例 - Member 集群验证"
  alerting_scene: "告警场景测试"
  whizard_events_scene: "事件场景测试"
  whizard_logs_scene: "日志场景测试"
  whizard_auditing_scene: "审计场景测试"
  notification_scene: "通知场景测试"
