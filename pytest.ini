[pytest]
markers =
    authentication: 认证管理测试
    mul_cluster: 多集群测试（兼容旧标记）
    multi_cluster: 多集群测试 - Member 集群验证
    access_management: 访问管理测试（成员、角色）
    whizard_events: whizard 事件模块测试
    whizard_events_scene: whizard 事件场景测试
    whizard_logs: whizard 日志模块测试
    whizard_logs_scene: whizard 日志场景测试
    whizard_auditing: whizard 审计模块测试
    whizard_auditing_scene: whizard 审计场景测试
    alerting_management: whizard-alerting 告警管理模块测试
    alerting_scene: 告警场景测试
    tenant_permission: 租户权限测试
    notification: 通知管理模块测试
    notification_scene: 通知场景测试
    whizard_network_traffic: whizard-network-traffic 网络流量拓扑模块测试
    whizard_http_traffic: whizard-http-traffic HTTP服务拓扑模块测试
    whizard_http_traffic_scene: whizard-http-traffic 场景测试
    whizard_network_traffic_scene: whizard-network-traffic 场景测试
    
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
